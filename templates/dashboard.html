<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen-Z Blog Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">

</head>

<body>

    <div class="container py-4">

        <!-- Header -->
        <div class="mb-4">
            <h1 class="fw-bold">Admin Dashboard</h1>
            <p class="text-secondary">Manage your posts ✨</p>
        </div>

        <!-- Top Bar -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <!-- // <input type="text" class="form-control search-box w-auto" placeholder="Search posts..."> -->

            <form action="/uploader" method="post" enctype="multipart/form-data">
                <input type="file" name="file_upload" required>
                <button type="submit" class="btn btn-gradient rounded-pill px-4">submit
                </button>
            </form>

            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <button class="btn btn-gradient rounded-pill px-4" onclick="window.location.href='/edit/0'">
                    Add Post
                </button>
                <button class="btn btn-gradient rounded-pill px-4" onclick="window.location.href='/home'">
                    Home
                </button>
                <button class="btn btn-gradient rounded-pill px-4" onclick="window.location.href='/logout'">
                    Log-out
                </button>
            </div>
        </div>

        <!-- Posts Grid -->
        <div class="row g-4">
            {% for post in posts %}
            <!-- Card 1 -->
            <div class="col-md-6 col-lg-4">
                <div class="card p-3 shadow-lg">
                    <h5>{{post.title}}</h5>
                    <p class="text-secondary small"> {{post.date}}</p>
                    <div class="d-flex justify-content-between">
                        <a href="/edit/{{post.sno}}" class="btn btn-sm btn-edit"><i class="fas fa-pen"></i> Edit</a>
                        <a href="/delete/{{post.sno}}" class="btn btn-sm btn-delete"><i class="fas fa-trash"></i>
                            Delete</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

    </div>

</body>

</html>

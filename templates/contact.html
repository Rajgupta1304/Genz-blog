{% extends "layout.html" %}

{% block body %}

<!-- Page Header-->
<header class="masthead" style="background-image: url('{{ url_for('static', filename='assets/img/contact-bg.jpg') }}')">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="page-heading">
                    <h1>Contact Us</h1>
                    <span class="subheading">Let’s Link Up</span>
                </div>
            </div>
        </div>
    </div>
    </div>
</header>
<!-- Main Content-->
<main class="mb-4">
    <div class="container px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <p>Want to get in touch? Fill out the form below to send me a message and I will get back to you as soon
                    as possible!</p>
                <div class="my-5">

                    <form id="contactForm" action="/contact" method="post" >

                        <!-- Name -->
                        <div class="form-floating mb-3">
                            <input class="form-control" name="name" id="name" type="text"
                                placeholder="Enter your name..." required />
                            <label for="name">Name</label>
                            <div class="invalid-feedback">A name is required.</div>
                        </div>

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input class="form-control" name="email" id="email" type="email"
                                placeholder="Enter your email..." required />
                            <label for="email">Email address</label>
                            <div class="invalid-feedback">Valid email is required.</div>
                        </div>

                        <!-- Phone -->
                        <div class="form-floating mb-3">
                            <input class="form-control" name="phone" id="phone" type="tel"
                                placeholder="Enter your phone number..." required />
                            <label for="phone">Phone Number</label>
                            <div class="invalid-feedback">A phone number is required.</div>
                        </div>

                        <!-- Message -->
                        <div class="form-floating mb-3">
                            <textarea class="form-control" name="message" id="message"
                                placeholder="Enter your message here..." style="height: 12rem" required></textarea>
                            <label for="message">Message</label>
                            <div class="invalid-feedback">A message is required.</div>
                        </div>

                        <!-- Submit Button -->
                        <button class="btn btn-aesthetic-3 rounded-pill px-4 py-2" type="submit">
                            Send
                        </button>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}

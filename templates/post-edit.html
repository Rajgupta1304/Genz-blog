<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post - Gen-Z Blog</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
        }

        .card {
            color: white;
            background: #0f172a;
            border: none;
            border-radius: 16px;
        }

        .form-control {
            background: #1e293b;
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .btn-gradient {
            background: linear-gradient(45deg, #6366f1, #a855f7);
            border: none;
            color: white;
        }

        .btn-back {
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <!-- Back Button -->
        <a href="/dashboard" class="btn btn-back mb-3">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <!-- Header -->
        <div class="mb-4">
            <h2 class="fw-bold">Add/Edit Post</h2>
            <p class="text-secondary">Update your blog content ✨</p>
        </div>

        <!-- Form Card -->
        <div class="card p-4 shadow-lg">

            <form action="{{ url_for('edit', sno=post.sno if post else 0) }}" method="POST">

                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label">Post Title</label>
                    <input type="text" name="post-title" class="form-control" placeholder="Enter post title"
                        value="{{post.title}}">
                </div>

                <!-- Image URL -->
                <div class="mb-3">
                    <label class="form-label">Post Image</label>
                    <input type="text" name="post-img" class="form-control" placeholder="Post images..."
                        value="{{post.img_file}}">
                </div>

                <!-- Category -->
                <div class="mb-3">
                    <label class="form-label">Post-Slug</label>
                    <input type="text" name="post-slug" class="form-control" placeholder="Post slug..."
                        value="{{post.slug}}">
                </div>

                <!-- Content -->
                <div class="mb-3">
                    <label class="form-label">Content</label>
                    <textarea name="post-content" class="form-control" rows="6"
                        placeholder="Write your blog here...">{{post.content}}</textarea>
                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between">
                    <button type="reset" class="btn btn-outline-light">Reset</button>
                    <button type="submit" class="btn btn-gradient px-4">
                        <i class="fas fa-save"></i> Add/Update Post
                    </button>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
